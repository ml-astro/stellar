<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Околоземный калькулятор</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <script>
        function toDecimalDegrees(value) {
            degArray = value.split(":")
            seconds = 0
            if (degArray.length == 3) {
                seconds = degArray[2] / 3600
            }
            if (degArray[0] < 0) {
                return parseInt(degArray[0]) - degArray[1] / 60 - seconds
            }
            return parseInt(degArray[0]) + degArray[1] / 60 + seconds
        }
    </script>
    <script src="./distance_calculator.js">
    </script>
    <script>
        let observations = [];
        function calculate(form) {
            const rawDate = document.getElementById("datetime").value;
            const [datePart, timePart] = rawDate.split('T');
            const [year, month, day] = datePart.split('-').map(Number);
            const [hour, minute] = timePart.split(':').map(Number);
            const observationDate = new Date(year, month - 1, day, hour, minute);
            observations[0] = {
                lat: toDecimalDegrees(form.lat1.value),
                lon: toDecimalDegrees(form.lon1.value),
                ra: toDecimalDegrees(form.ra1.value) * 15,
                dec: toDecimalDegrees(form.dec1.value)
            };
            observations[1] = {
                lat: toDecimalDegrees(form.lat2.value),
                lon: toDecimalDegrees(form.lon2.value),
                ra: toDecimalDegrees(form.ra2.value) * 15,
                dec: toDecimalDegrees(form.dec2.value)
            };
            calculateDistance(observationDate, observations);
        }
    </script>
    <h1>КАЛЬКУЛЯТОР ОКОЛОЗЕМНЫХ РАССТОЯНИЙ</h1>
    <form id="obervations">
        <p><b>Время наблюдений</b></p>
        <input type="datetime-local" id="datetime" name="datetime">
        <hr>
        <p><b>Место #1</b> - <i>ближайшее к объекту</i></p>
        <label>Широта:</label>
        <input type="text" name="lat1" id="lat1" placeholder="ГРАД:МИН:СЕК">
        <label>Долгота:</label>
        <input type="text" name="lon1" id="lon1" placeholder="ГРАД:МИН:СЕК">
        <br>
        <p><b>Положение объекта</b></p>
        <label>Часовой угол:</label>
        <input type="text" name="ra1" id="ra1" placeholder="ЧАС:МИН:СЕК">
        <label>Склонение:</label>
        <input type="text" name="dec1" id="dec1" placeholder="ГРАД:МИН:СЕК">
        <br><br>
        <hr>
        <p><b>Место #2</b></p>
        <label>Широта:</label>
        <input type="text" name="lat2" id="lat2" placeholder="ГРАД:МИН:СЕК">
        <label>Долгота:</label>
        <input type="text" name="lon2" id="lon2" placeholder="ГРАД:МИН:СЕК">
        <br>
        <p><b>Положение объекта</b></p>
        <label>Часовой угол:</label>
        <input type="text" name="ra2" id="ra2" placeholder="ЧАС:МИН:СЕК">
        <label>Склонение:</label>
        <input type="text" name="dec2" id="dec2" placeholder="ГРАД:МИН:СЕК">
        <br><br>
        <hr>
        <input onclick="calculate(this.form)" type="button" name="calc" value="РАССЧИТАТЬ РАССТОЯНИЕ ДО ОБЪЕКТА">
    </form>
    <table><tbody id="result"></tbody></table>
    <pre id="extra"></pre>
</body>

</html>
